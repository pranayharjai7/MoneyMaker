services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: celery -A backend.jobs.celery_app.celery_app worker --loglevel=INFO
    depends_on:
      - redis

  beat:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: celery -A backend.jobs.celery_app.celery_app beat --loglevel=INFO
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
